<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sacred Flow | Adarsh Jagadeesh Bilagi</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
:root {
    /* Day Theme Variables */
    --bg-color: #e0f2f1;
    --text-color: #050c1a;
    --nav-bg: rgba(255, 255, 255, 0.7);
    --card-bg: rgba(255, 255, 255, 0.85);
    --glow: rgba(0, 0, 0, 0.1);
    --hover-color: #0d47a1;
}

body.night {
    /* Night Theme Variables */
    --bg-color: #050c1a;
    --text-color: #f1f1f1;
    --nav-bg: rgba(5, 12, 26, 0.8);
    --card-bg: rgba(10, 25, 47, 0.85);
    --glow: rgba(230, 181, 102, 0.2);
    --hover-color: #E6B566;
    background: radial-gradient(circle at 50% 20%, #1a237e 0%, #0d1b2a 50%, #050c1a 100%);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    scroll-behavior: smooth;
}

body {
    background: var(--bg-color);
    background-image: 
        radial-gradient(circle at 50% 15%, rgba(74,144,226,0.1) 0%, transparent 50%),
        radial-gradient(circle at 20% 80%, rgba(178, 223, 219, 0.4) 0%, transparent 60%);
    color: var(--text-color);
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
    transition: background 1.5s ease, color 1.5s ease;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    padding: 20px;
    z-index: 1000;
    background: var(--nav-bg);
    backdrop-filter: blur(10px);
    transition: background 1.5s ease;
}

.navbar a {
    margin: 0 20px;
    text-decoration: none;
    color: var(--text-color);
    font-weight: 500;
    transition: 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 0.9rem;
}

.navbar a:hover {
    color: var(--hover-color);
}

/* SECTIONS */
section {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 120px 10%;
}

section:first-of-type {
    position: relative;
    z-index: 2;
}

section:first-of-type h1 {
    transform: translateY(-20px);
}

.content {
    width: 45%;
    padding: 40px;
    border-radius: 2px;
    background: var(--card-bg);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 10px 30px var(--glow);
    transition: 0.6s ease, background 1.5s ease;
    position: relative;
    z-index: 2;
}

.left { margin-right: auto; }
.right { margin-left: auto; }

/* HEADINGS */
h1 {
    font-family: 'Cinzel', serif;
    font-size: 4.5rem;
    text-align: center;
    letter-spacing: 4px;
    text-shadow: 0 0 20px var(--glow);
    transition: text-shadow 1.5s ease;
}

h2 {
    font-family: 'Cinzel', serif;
    margin-bottom: 20px;
    font-size: 2rem;
    color: var(--hover-color);
}

p {
    line-height: 1.8;
    font-size: 1.05rem;
}

/* RIVER SVG */
.river-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 120vh; 
    pointer-events: none;
    z-index: 0;
    display: flex;
    justify-content: center;
    will-change: transform;
}

svg {
    height: 200vh;
    width: 100%;
}

/* Base River Settings */
#riverPath {
    stroke-width: 45;
    stroke-linecap: round;
    transition: filter 1.5s ease;
    animation: riverPulse 8s ease-in-out infinite;
}

body.night #riverPath {
    filter: drop-shadow(0 0 20px rgba(230,181,102,0.5)) drop-shadow(0 0 40px rgba(66,165,245,0.3));
}

/* Flowing Current Animations */
.flow-line {
    fill: none;
    stroke: #ffffff;
    stroke-linecap: round;
}

.flow-line.fast {
    stroke-width: 4;
    opacity: 0.6;
    stroke-dasharray: 40 160; /* length of dash, length of gap */
    animation: flowDown 3s linear infinite;
}

.flow-line.slow {
    stroke-width: 10;
    opacity: 0.3;
    stroke-dasharray: 100 300;
    animation: flowDown 6s linear infinite;
}

@keyframes flowDown {
    to {
        stroke-dashoffset: -4000; /* Pushes the dashes downwards along the path */
    }
}

@keyframes riverPulse {
    0% { stroke-width: 45; }
    50% { stroke-width: 50; }
    100% { stroke-width: 45; }
}

/* REVEAL ANIMATIONS */
.reveal {
    opacity: 0;
    transform: translateY(60px);
    transition: 1.2s cubic-bezier(0.25, 1, 0.5, 1);
}

.reveal.active {
    opacity: 1;
    transform: translateY(0);
}

/* FADE EDGES FOR RIVER */
.river-container::before, .river-container::after {
    content: "";
    position: absolute;
    top: 0;
    height: 100%;
    width: 15%;
    z-index: 1;
}

.river-container::before {
    left: 0;
    background: linear-gradient(to right, var(--bg-color), transparent);
}

.river-container::after {
    right: 0;
    background: linear-gradient(to left, var(--bg-color), transparent);
}

</style>
</head>

<body>

<div class="navbar">
    <a href="#origin">Origin</a>
    <a href="#streams">Streams</a>
    <a href="#gallery">Gallery</a>
    <a href="#connect">Connect</a>
</div>

<div class="river-container">
    <svg viewBox="0 0 300 4000" preserveAspectRatio="none">
        <defs>
            <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#e0f7fa"/>
                <stop offset="30%" stop-color="#80deea"/>
                <stop offset="60%" stop-color="#26c6da"/>
                <stop offset="100%" stop-color="#006064"/>
            </linearGradient>
            
            <linearGradient id="nightWaterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="30%" stop-color="#90caf9"/>
                <stop offset="60%" stop-color="#42a5f5"/>
                <stop offset="100%" stop-color="#0d47a1"/>
            </linearGradient>

            <linearGradient id="glacierGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="60%" stop-color="#e0f7fa"/>
                <stop offset="100%" stop-color="#b2ebf2"/>
            </linearGradient>
            
            <linearGradient id="nightGlacierGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#e3f2fd"/>
                <stop offset="60%" stop-color="#42a5f5"/>
                <stop offset="100%" stop-color="#0d47a1"/>
            </linearGradient>
        </defs>

        <g id="waterfalls" stroke="url(#waterGradient)" fill="none" stroke-linecap="round" opacity="0.8">
            <path stroke-width="12" d="M 80 180 Q 100 280 150 400" />
            <path stroke-width="18" d="M 150 200 Q 150 300 150 400" />
            <path stroke-width="10" d="M 240 160 Q 210 280 150 400" />
        </g>
        
        <g fill="none" stroke="#ffffff" stroke-linecap="round">
            <path class="flow-line fast" stroke-width="3" d="M 80 180 Q 100 280 150 400" />
            <path class="flow-line fast" stroke-width="4" d="M 150 200 Q 150 300 150 400" />
            <path class="flow-line fast" stroke-width="2" d="M 240 160 Q 210 280 150 400" />
        </g>

        <path
            id="riverPath"
            d="M150 400 
               C230 700 70 1000 180 1400 
               C250 1800 80 2200 160 2600 
               C200 3000 120 3400 150 3800 
               C180 4000 100 4100 150 4200"
            fill="none"
            stroke="url(#waterGradient)"
            opacity="0.8"
        />
        
        <path
            class="flow-line fast"
            d="M150 400 
               C230 700 70 1000 180 1400 
               C250 1800 80 2200 160 2600 
               C200 3000 120 3400 150 3800 
               C180 4000 100 4100 150 4200"
        />

        <path
            class="flow-line slow"
            d="M150 400 
               C230 700 70 1000 180 1400 
               C250 1800 80 2200 160 2600 
               C200 3000 120 3400 150 3800 
               C180 4000 100 4100 150 4200"
        />

        <path 
            class="ice-layer" 
            d="M -50 -50 L 350 -50 L 350 120 L 260 90 L 150 150 L 60 100 L -50 130 Z" 
            fill="#ffffff" 
            opacity="0.4"
        />
        
        <path 
            id="glacier" 
            d="M -50 -50 L 350 -50 L 350 140 L 280 120 L 240 160 L 200 110 L 150 200 L 110 130 L 80 180 L 30 110 L -50 150 Z" 
            fill="url(#glacierGrad)" 
            filter="drop-shadow(0 15px 25px rgba(0,0,0,0.25))" 
        />
    </svg>
</div>

<script>
// Scroll Reveal Logic
function reveal() {
    const reveals = document.querySelectorAll('.reveal');
    const windowHeight = window.innerHeight;
    
    reveals.forEach(element => {
        const elementTop = element.getBoundingClientRect().top;
        if (elementTop < windowHeight - 100) {
            element.classList.add('active');
        }
    });
}

window.addEventListener('scroll', reveal);
window.addEventListener('load', reveal);

// Background Gradient Color Shift Animation
const dayGradient = document.querySelector("#waterGradient");
const nightGradient = document.querySelector("#nightWaterGradient");
let flow = 0;

function animateWater() {
    flow += 0.3;
    dayGradient.setAttribute("gradientTransform", `translate(0 ${flow})`);
    nightGradient.setAttribute("gradientTransform", `translate(0 ${flow})`);
    requestAnimationFrame(animateWater);
}
animateWater();

// Parallax for Hero Text
window.addEventListener("scroll", function() {
    const hero = document.querySelector("section:first-of-type h1");
    const scroll = window.scrollY;

    if (hero) {
        // Fade out slightly faster so it doesn't clash with the glacier
        const opacity = 1 - (scroll / 300);
        hero.style.opacity = Math.max(opacity, 0);
        hero.style.transform = `translateY(${scroll * 0.4}px)`;
    }
});

// Automatic Day/Night Detection
function setThemeByTime() {
    const hour = new Date().getHours();
    const body = document.body;
    const riverPath = document.getElementById("riverPath");
    const waterfalls = document.getElementById("waterfalls");
    const glacier = document.getElementById("glacier");

    if (hour >= 6 && hour < 18) {
        body.classList.remove("night");
        riverPath.setAttribute("stroke", "url(#waterGradient)");
        waterfalls.setAttribute("stroke", "url(#waterGradient)");
        glacier.setAttribute("fill", "url(#glacierGrad)");
    } else {
        body.classList.add("night");
        riverPath.setAttribute("stroke", "url(#nightWaterGradient)");
        waterfalls.setAttribute("stroke", "url(#nightWaterGradient)");
        glacier.setAttribute("fill", "url(#nightGlacierGrad)");
    }
}

setThemeByTime();
</script>

</body>
</html>
